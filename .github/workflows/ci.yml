name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Build
        env:
          FRAPPE_URL: https://your-frappe-site.com
          NEXT_PUBLIC_FRAPPE_URL: https://your-frappe-site.com
          NEXT_PUBLIC_API_BASE_URL: /api
        run: npm run build
